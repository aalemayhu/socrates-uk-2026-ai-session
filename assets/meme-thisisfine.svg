<svg width="100%" viewBox="0 0 520 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <title>It's just text and git</title>
  <desc>This-is-fine format meme: a calm figure with coffee at a desk while flames labelled user uploads surround the room, captioned it's just text and git.</desc>
  <rect x="1.5" y="1.5" width="517" height="297" rx="18" fill="#fff7f9" stroke="#fbcfe8" stroke-width="2"/>

  <!-- flames -->
  <g stroke-linejoin="round">
    <path d="M40 270 q-14 -40 16 -58 q-10 30 14 30 q14 0 10 -26 q26 22 14 54z" fill="#ec4899"/>
    <path d="M44 270 q-6 -22 14 -34 q-2 18 10 18 q8 0 6 -16 q16 14 8 32z" fill="#fbbf24"/>
    <path d="M470 270 q14 -40 -16 -58 q10 30 -14 30 q-14 0 -10 -26 q-26 22 -14 54z" fill="#ec4899"/>
    <path d="M466 270 q6 -22 -14 -34 q2 18 -10 18 q-8 0 -6 -16 q-16 14 -8 32z" fill="#fbbf24"/>
    <path d="M150 268 q-8 -24 10 -36 q-4 18 8 18 q8 0 6 -16 q16 14 8 34z" fill="#db2777"/>
    <path d="M372 268 q8 -24 -10 -36 q4 18 -8 18 q-8 0 -6 -16 q-16 14 -8 34z" fill="#db2777"/>
  </g>

  <!-- desk -->
  <rect x="196" y="214" width="128" height="14" rx="3" fill="#831843"/>
  <rect x="206" y="228" width="10" height="40" fill="#831843"/>
  <rect x="304" y="228" width="10" height="40" fill="#831843"/>
  <!-- mug -->
  <rect x="286" y="196" width="22" height="18" rx="3" fill="#fff7f9" stroke="#831843" stroke-width="4"/>
  <path d="M308 200 q12 0 12 9 t-12 9" fill="none" stroke="#831843" stroke-width="4"/>
  <path d="M292 190 q4 -8 0 -14 M300 190 q4 -8 0 -14" fill="none" stroke="#bd4f7c" stroke-width="3" stroke-linecap="round"/>

  <!-- figure -->
  <g stroke="#831843" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="244" cy="176" r="26" fill="#fff7f9"/>
    <path d="M214 214 q30 -22 60 0"/>
  </g>
  <circle cx="236" cy="174" r="3" fill="#831843"/>
  <circle cx="254" cy="174" r="3" fill="#831843"/>
  <path d="M234 186 q10 6 20 0" stroke="#831843" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- speech bubble -->
  <rect x="300" y="120" width="190" height="56" rx="14" fill="#fff" stroke="#fbcfe8" stroke-width="2"/>
  <path d="M312 172 l-14 22 l30 -16z" fill="#fff" stroke="#fbcfe8" stroke-width="2"/>
  <text x="395" y="146" font-size="17" font-weight="700" text-anchor="middle" fill="#1a0a10">It's just text + git.</text>
  <text x="395" y="167" font-size="17" font-weight="700" text-anchor="middle" fill="#db2777">It's fine.</text>

  <!-- flame label -->
  <text x="60" y="150" font-size="13" font-weight="700" fill="#831843" transform="rotate(-12 60 150)">users uploading</text>
  <text x="60" y="168" font-size="13" font-weight="700" fill="#831843" transform="rotate(-12 60 168)">anything</text>
</svg>
